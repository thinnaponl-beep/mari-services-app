<!-- หน้าจอ Login Screen -->
<div id="loginScreen" class="fixed inset-0 bg-[#f0f4f8] z-[99990] hidden flex-col items-center justify-center bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">
    <div class="bg-white p-10 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] max-w-md w-full text-center border border-gray-100 transform transition-all">
        <!-- Logo -->
        <div class="bg-brandLight w-24 h-24 mx-auto rounded-full flex items-center justify-center mb-6 shadow-inner border border-gray-50">
            <img src="https://i.postimg.cc/c4J26FXN/mari-logo-d-text.png" alt="Mari Services Logo" class="h-10 object-contain drop-shadow-sm">
        </div>
        
        <h2 class="text-2xl font-black text-brand mb-2">เข้าสู่ระบบ (Login)</h2>
        <p class="text-[13px] text-gray-500 mb-8 font-medium leading-relaxed">
            ระบบจัดการตารางงานและบุคลากร <br>
            <span class="text-brand font-bold">MARI Services Workspace</span>
        </p>
        
        <!-- Login Button -->
        <button onclick="verifyWithBackend()" id="btnLogin" class="w-full py-3.5 bg-brand text-white rounded-xl text-[14px] font-bold hover:bg-brandDark transition-all flex items-center justify-center gap-3 shadow-md hover:shadow-lg transform hover:-translate-y-0.5 group">
            <div class="bg-white p-1.5 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
            </div>
            ลงชื่อเข้าใช้ด้วยบัญชี Google
        </button>
        
        <!-- Error Message Box -->
        <div id="loginErrorMsg" class="mt-5 text-[12px] text-red-600 font-bold hidden bg-red-50 p-3 rounded-xl border border-red-100 flex flex-col items-center gap-1.5">
            <i class="fa-solid fa-triangle-exclamation text-lg text-red-500"></i>
            <span id="loginErrorText">ข้อความแจ้งเตือน</span>
        </div>
    </div>
    
    <div class="mt-8 text-[11px] text-gray-400 font-bold tracking-wider">
        &copy; 2026 MARI SERVICES. ALL RIGHTS RESERVED.
    </div>
</div>
