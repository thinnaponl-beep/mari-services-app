<!-- ======================================= -->
<!-- [PAGE COMPONENT]: INSPECTION (ตารางแผนการเข้าตรวจงาน) -->
<!-- ======================================= -->

<!-- 1. VIEW: หน้าจอหลักของตาราง Inspection -->
<div id="view-inspection" class="view-container hidden flex-grow flex-col overflow-hidden bg-[#f0f4f8]">
    <div class="bg-white px-6 py-3 flex flex-wrap items-center justify-between shrink-0 border-b border-gray-200 shadow-sm gap-4">
        <div class="flex items-center gap-3">
            <button onclick="changeInspectionMonth(-1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 rounded hover:bg-brand hover:text-white transition"><i class="fa-solid fa-chevron-left text-xs"></i></button>
            <input type="month" id="inspectionMonthPicker" onchange="setInspectionMonthFromPicker(this.value)" class="border border-gray-300 rounded px-3 py-1.5 text-sm font-bold text-brand outline-none focus:border-brand">
            <button onclick="changeInspectionMonth(1)" class="w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 rounded hover:bg-brand hover:text-white transition"><i class="fa-solid fa-chevron-right text-xs"></i></button>
        </div>
    </div>
    
    <div class="bg-white px-6 py-2 border-b border-gray-200 flex flex-wrap gap-4 text-[11px] font-medium shrink-0">
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-orange-400 rounded-sm"></div> วันเริ่มสัญญา</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-red-500 rounded-sm"></div> วันสิ้นสุดสัญญา</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 border border-gray-300 bg-white flex items-center justify-center text-[9px] font-bold">1</div> วันที่ปฏิบัติงาน (จำนวนคน)</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-green-500 rounded-sm"></div> เข้าตรวจสอบคุณภาพงาน</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-blue-500 rounded-sm"></div> วันส่งรายงาน</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-purple-400 rounded-sm"></div> วัน OJT</div>
        <div class="flex items-center gap-1.5"><div class="w-3 h-3 bg-pink-300 rounded-sm"></div> ทำเรื่องเบิกค่าจ้าง</div>
    </div>

    <div class="flex-grow overflow-auto bg-white custom-scrollbar p-4" id="inspectionTableContainer">
    </div>
</div>

<!-- 2. MODAL: ป๊อปอัปบันทึกกิจกรรม AE -->
<div id="inspectionModalOverlay" class="fixed inset-0 bg-gray-900/60 z-[99999] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform scale-100 transition-transform duration-200 border border-gray-100">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-brandLight/30">
            <h3 class="text-md font-black text-brand"><i class="fa-solid fa-list-check mr-2"></i> บันทึกกิจกรรม AE</h3>
            <button onclick="document.getElementById('inspectionModalOverlay').classList.add('hidden')" class="text-gray-400 hover:text-gray-800"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="p-6 flex flex-col gap-4">
            <input type="hidden" id="inspActId">
            <input type="hidden" id="inspClientId">
            <input type="hidden" id="inspDate">
            
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200">
                <p class="text-[12px] text-gray-500 font-medium mb-1">ลูกค้า: <span class="font-bold text-gray-800" id="inspClientNameDisplay">-</span></p>
                <p class="text-[12px] text-gray-500 font-medium">วันที่: <span class="font-bold text-brand" id="inspDateDisplay">-</span></p>
            </div>
            
            <div>
                <label class="block text-[12px] font-bold text-gray-600 mb-1">ประเภทกิจกรรม <span class="text-red-500">*</span></label>
                <select id="inspType" class="w-full border border-gray-300 rounded-md px-3 py-2.5 text-sm font-medium outline-none focus:border-brand">
                    <option value="">-- ไม่ระบุ / ลบกิจกรรม --</option>
                    <option value="Inspection">🟢 เข้าตรวจสอบคุณภาพงาน</option>
                    <option value="Report">🔵 วันส่งรายงาน</option>
                    <option value="OJT">🟣 วัน OJT (On-the-Job Training)</option>
                    <option value="Payment">🌸 ทำเรื่องเบิกค่าจ้าง</option>
                </select>
            </div>
            <div>
                <label class="block text-[12px] font-bold text-gray-600 mb-1">หมายเหตุ (Remark)</label>
                <textarea id="inspRemark" rows="3" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm font-medium outline-none focus:border-brand" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
            </div>
        </div>
        <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50/50">
            <button onclick="document.getElementById('inspectionModalOverlay').classList.add('hidden')" class="px-5 py-2.5 bg-white border border-gray-300 text-gray-600 rounded-md text-sm font-bold hover:bg-gray-50 transition">ยกเลิก</button>
            <button onclick="saveInspectionActivity()" class="px-6 py-2.5 bg-brand text-white rounded-md text-sm font-bold hover:bg-brandDark shadow-sm transition">บันทึกข้อมูล</button>
        </div>
    </div>
</div>

<!-- 3. JAVASCRIPT: โค้ดควบคุมสำหรับหน้านี้ -->
<script>
    var MOCK_SITE_ACTIVITIES = []; 
    
    // 💡 1. โหลดค่าเดือนล่าสุดที่ผู้ใช้เลือกไว้จาก localStorage (ถ้ามี)
    var savedInspDateStr = localStorage.getItem('mari_inspection_date');
    var currentInspectionDate = savedInspDateStr ? new Date(savedInspDateStr) : new Date();

    function initInspectionView() {
        var monthPicker = document.getElementById('inspectionMonthPicker');
        if(monthPicker) {
            var yyyy = currentInspectionDate.getFullYear();
            var mm = String(currentInspectionDate.getMonth() + 1).padStart(2, '0');
            monthPicker.value = yyyy + '-' + mm;
        }
        renderInspectionMatrix();
    }

    function changeInspectionMonth(offset) {
        currentInspectionDate.setMonth(currentInspectionDate.getMonth() + offset);
        
        // 💡 2. บันทึกค่าเดือนล่าสุดลง localStorage
        localStorage.setItem('mari_inspection_date', currentInspectionDate.toISOString());
        
        initInspectionView();
    }

    function setInspectionMonthFromPicker(val) {
        if(!val) return;
        var parts = val.split('-');
        currentInspectionDate = new Date(parts[0], parseInt(parts[1]) - 1, 1);
        
        // 💡 3. บันทึกค่าเดือนล่าสุดลง localStorage
        localStorage.setItem('mari_inspection_date', currentInspectionDate.toISOString());
        
        renderInspectionMatrix();
    }

    function formatThaiDateShort(dateStr) {
        if(!dateStr) return '-';
        var d = new Date(dateStr);
        if(isNaN(d.getTime())) return '-';
        var months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        var year = (d.getFullYear() + 543).toString().slice(-2);
        return d.getDate() + ' ' + months[d.getMonth()] + ' ' + year;
    }

    function renderInspectionMatrix() {
        var container = document.getElementById('inspectionTableContainer');
        if(!container) return;

        var yyyy = currentInspectionDate.getFullYear();
        var mm = currentInspectionDate.getMonth();
        var daysInMonth = new Date(yyyy, mm + 1, 0).getDate();
        
        var monthNamesFull = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        var headerMonthText = monthNamesFull[mm] + ' ' + (yyyy + 543); 

        var html = '<table class="w-full border-collapse text-center text-[11px] min-w-[1800px] border border-gray-300 shadow-sm">';

        html += '<thead>';
        html += '<tr class="bg-brandDark text-white">';
        html += '<th rowspan="2" class="border border-white/20 p-3 sticky left-0 z-20 bg-brandDark w-56 font-bold text-[13px]">ไซต์งาน</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-32 font-medium bg-brand/90">วันเข้าบริการ</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-32 font-medium bg-brand/90">ความถี่ / เดือน</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-28 font-medium bg-brand/90">วันที่เริ่มสัญญา</th>';
        html += '<th rowspan="2" class="border border-white/20 p-2 w-28 font-medium bg-brand/90">วันที่สิ้นสุด</th>';
        html += '<th colspan="' + daysInMonth + '" class="border border-white/20 p-2 bg-brandDark text-[14px] font-black tracking-widest">' + headerMonthText + '</th>';
        html += '</tr>';

        html += '<tr class="bg-gray-100">';
        for(var d=1; d<=daysInMonth; d++) {
            var dateObj = new Date(yyyy, mm, d);
            var dayNames = ['อา','จ','อ','พ','พฤ','ศ','ส'];
            var dayName = dayNames[dateObj.getDay()];
            var isWeekend = (dateObj.getDay() === 0 || dateObj.getDay() === 6);
            var bgHead = isWeekend ? 'bg-red-50 text-red-500' : 'bg-gray-50 text-gray-700';
            html += '<th class="border border-gray-300 p-1 w-10 ' + bgHead + '"><div class="font-normal text-[9px]">' + dayName + '</div><div class="font-bold">' + String(d).padStart(2,'0') + '</div></th>';
        }
        html += '</tr></thead>';

        html += '<tbody>';
        MOCK_CLIENTS.forEach(function(client) {
            if(client.type === 'system') return;

            var cStart = client.startDate ? new Date(client.startDate) : null;
            var cEnd = client.endDate ? new Date(client.endDate) : null;
            
            var cServiceDays = client.serviceDays || '-'; 
            var cFreq = client.frequency || '-';
            var startTxt = client.startDate ? formatThaiDateShort(client.startDate) : '-';
            var endTxt = client.endDate ? formatThaiDateShort(client.endDate) : '-';

            var clientBgColor = (typeof hexToRgba === 'function') ? hexToRgba(client.color, 0.2) : (client.color || '#f3f4f6');

            html += '<tr class="hover:bg-gray-50/50 transition-colors">';
            html += '<td class="border border-gray-200 p-3 sticky left-0 z-10 text-left font-bold text-gray-800 truncate shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)]" style="background-color: ' + clientBgColor + ';" title="' + client.name + '">' + client.name + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-600 bg-white font-medium">' + cServiceDays + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-600 bg-white font-medium">' + cFreq + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-500 bg-white">' + startTxt + '</td>';
            html += '<td class="border border-gray-200 p-2 text-gray-500 bg-white">' + endTxt + '</td>';

            for(var d=1; d<=daysInMonth; d++) {
                var cellDateStr = yyyy + '-' + String(mm+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                var bgColorClass = 'bg-white cursor-pointer hover:bg-gray-100 transition-colors';
                var textHtml = '';

                if(cStart && formatDateString(cStart) === cellDateStr) { bgColorClass = 'bg-orange-400 cursor-pointer'; }
                if(cEnd && formatDateString(cEnd) === cellDateStr) { bgColorClass = 'bg-red-500 cursor-pointer'; }

                var activities = MOCK_SITE_ACTIVITIES.filter(function(a) { return a.clientId === client.id && a.date === cellDateStr; });
                if(activities.length > 0) {
                    var act = activities[0]; 
                    if(act.type === 'Inspection') bgColorClass = 'bg-green-500 cursor-pointer shadow-inner';
                    else if(act.type === 'Report') bgColorClass = 'bg-blue-500 cursor-pointer shadow-inner';
                    else if(act.type === 'OJT') bgColorClass = 'bg-purple-400 cursor-pointer shadow-inner';
                    else if(act.type === 'Payment') bgColorClass = 'bg-pink-300 cursor-pointer shadow-inner';
                }

                var shifts = MOCK_SHIFTS.filter(function(s) { return s.clientId === client.id && s.date === cellDateStr && s.status !== 'cancelled' && s.status !== 'absent'; });
                var totalWorkers = 0;
                shifts.forEach(function(s) { if(s.hks) totalWorkers += s.hks.length; });

                if(totalWorkers > 0) {
                    var textColorClass = (bgColorClass.includes('bg-white') || bgColorClass.includes('bg-gray')) ? 'text-gray-800' : 'text-white drop-shadow-md';
                    textHtml = '<span class="font-black text-[12px] ' + textColorClass + '">' + totalWorkers + '</span>';
                }

                html += '<td class="border border-gray-200 relative group p-0" onclick="openInspectionActivityModal(\'' + client.id + '\', \'' + cellDateStr + '\')">';
                html += '<div class="w-full h-full min-h-[36px] flex items-center justify-center ' + bgColorClass + '">' + textHtml + '</div>';
                html += '</td>';
            }
            html += '</tr>';
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }

    function openInspectionActivityModal(clientId, dateStr) {
        var isAdmin = (typeof CURRENT_USER !== 'undefined' && CURRENT_USER && (CURRENT_USER.role === 'Admin / Supervisor' || CURRENT_USER.role === 'Admin' || CURRENT_USER.role === 'DEV'));
        if (!isAdmin && typeof CURRENT_USER !== 'undefined' && CURRENT_USER && CURRENT_USER.role === 'Viewer') { return; }

        var existingAct = MOCK_SITE_ACTIVITIES.find(function(a) { return a.clientId === clientId && a.date === dateStr; });
        var c = MOCK_CLIENTS.find(function(x){ return x.id === clientId;});
        var clientName = c ? c.name : clientId;

        document.getElementById('inspActId').value = existingAct ? existingAct.id : '';
        document.getElementById('inspClientId').value = clientId;
        document.getElementById('inspDate').value = dateStr;
        document.getElementById('inspClientNameDisplay').innerText = clientName;
        document.getElementById('inspDateDisplay').innerText = dateStr;
        document.getElementById('inspType').value = existingAct ? existingAct.type : '';
        document.getElementById('inspRemark').value = existingAct ? (existingAct.remark || '') : '';

        document.getElementById('inspectionModalOverlay').classList.remove('hidden');
    }

    function saveInspectionActivity() {
        var actId = document.getElementById('inspActId').value;
        var clientId = document.getElementById('inspClientId').value;
        var dateStr = document.getElementById('inspDate').value;
        var type = document.getElementById('inspType').value;
        var remark = document.getElementById('inspRemark').value;
        var currentUserEmail = (typeof CURRENT_USER !== 'undefined' && CURRENT_USER) ? CURRENT_USER.email : 'Unknown';

        var data = { id: actId || 'ACT-' + new Date().getTime(), clientId: clientId, date: dateStr, type: type, remark: remark, actionBy: currentUserEmail };

        if(type === '') {
            MOCK_SITE_ACTIVITIES = MOCK_SITE_ACTIVITIES.filter(function(a) { return !(a.clientId === clientId && a.date === dateStr); });
        } else {
            var idx = MOCK_SITE_ACTIVITIES.findIndex(function(a) { return a.id === data.id; });
            if(idx > -1) MOCK_SITE_ACTIVITIES[idx] = data;
            else MOCK_SITE_ACTIVITIES.push(data);
        }

        if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run.saveSiteActivityToBackend(data, type === '');
        }

        document.getElementById('inspectionModalOverlay').classList.add('hidden');
        renderInspectionMatrix(); 
        if(typeof showToast === 'function') showToast('บันทึกกิจกรรมเรียบร้อยแล้ว');
    }
</script>
